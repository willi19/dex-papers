<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dex-papers · browser</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --panel2: #1f232c; --border: #2a2f3a;
    --text: #e6e8ee; --muted: #9aa3b2; --accent: #6ea8fe; --accent2: #2b8a5b;
    --chip: #262b35; --chipOn: #3a6df0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: var(--bg);
    border-bottom: 1px solid var(--border); padding: 16px 20px 12px; }
  h1 { margin: 0 0 4px; font-size: 18px; }
  h1 .count { color: var(--muted); font-weight: 400; font-size: 14px; }
  .search { width: 100%; max-width: 460px; padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel2); color: var(--text);
    font-size: 14px; margin-top: 8px; }
  .search:focus { outline: none; border-color: var(--accent); }
  .barlabel { color: var(--muted); font-size: 12px; text-transform: uppercase;
    letter-spacing: .04em; margin: 12px 0 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { cursor: pointer; user-select: none; padding: 4px 10px; border-radius: 999px;
    background: var(--chip); border: 1px solid var(--border); color: var(--text);
    font-size: 12px; white-space: nowrap; }
  .chip .n { color: var(--muted); margin-left: 4px; }
  .chip.on { background: var(--chipOn); border-color: var(--chipOn); color: #fff; }
  .chip.on .n { color: #dce6ff; }
  .chip.coll { background: #20303f; }
  .chip.coll.on { background: var(--accent2); border-color: var(--accent2); }
  .zonetoggle { cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 6px; }
  .zonetoggle:hover { color: var(--text); }
  .zonetoggle .caret { font-size: 9px; transition: transform .15s; display: inline-block; }
  .zonetoggle.open .caret { transform: rotate(90deg); }
  .zonetoggle .zonesummary { text-transform: none; letter-spacing: 0; color: var(--accent); }
  #filterZone.collapsed { display: none; }
  .catheads { display: flex; flex-wrap: wrap; gap: 6px; }
  .cathead { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    user-select: none; padding: 4px 11px; border-radius: 8px; background: var(--panel2);
    border: 1px solid var(--border); color: var(--text); font-size: 12px; }
  .cathead:hover { border-color: var(--accent); }
  .cathead.open { border-color: var(--accent); background: #20262f; }
  .cathead .caret { color: var(--muted); font-size: 9px; transition: transform .15s; display: inline-block; }
  .cathead.open .caret { transform: rotate(90deg); }
  .cathead .cn { color: var(--muted); }
  .cathead .actN { background: var(--chipOn); color: #fff; border-radius: 999px;
    padding: 0 6px; font-size: 11px; }
  .catpanel { margin-top: 8px; padding: 8px 10px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px; }
  .catpanel .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 6px; }
  .clear { cursor: pointer; padding: 4px 10px; border-radius: 999px; font-size: 12px;
    background: transparent; border: 1px dashed var(--border); color: var(--muted); }
  .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  main { padding: 16px 20px 60px; display: block; max-width: 1120px; }
  /* compact expandable table rows */
  .rowwrap { margin-bottom: 5px; }
  .prow { display: flex; align-items: center; gap: 10px; padding: 7px 11px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel); cursor: pointer; }
  .prow:hover { border-color: var(--accent); }
  .prow.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .prow .caret { color: var(--muted); font-size: 9px; width: 9px; flex-shrink: 0;
    transition: transform .15s; display: inline-block; }
  .prow.open .caret { transform: rotate(90deg); }
  .prow .pt { flex: 1; font-size: 13.5px; font-weight: 500; line-height: 1.3; }
  .prow .pmeta { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .prow .pcites { font-size: 11px; padding: 2px 7px; border-radius: 6px; background: var(--panel2);
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .prow .pcoll { font-size: 11px; color: var(--accent); white-space: nowrap; }
  .pdetail { padding: 12px 14px; border: 1px solid var(--accent); border-top: none;
    border-radius: 0 0 8px 8px; background: var(--panel2); display: flex; gap: 14px; align-items: flex-start; }
  .pdetail .pimg { width: 260px; flex-shrink: 0; }
  .pdetail .pimg img { width: 100%; height: auto; border-radius: 8px; display: block; background: #0d1117; }
  .pdetail .pbody { flex: 1; display: flex; flex-direction: column; gap: 9px; min-width: 0; }
  .pdetail .pdesc { font-size: 13px; color: var(--text); line-height: 1.5; }
  @media (max-width: 620px) { .pdetail { flex-direction: column; } .pdetail .pimg { width: 100%; max-width: 360px; } }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 6px; background: var(--panel2);
    color: var(--muted); border: 1px solid var(--border); }
  .badge.coll { color: var(--accent); }
  .links { display: flex; gap: 8px; flex-wrap: wrap; }
  .links a { font-size: 12px; text-decoration: none; padding: 4px 9px; border-radius: 7px;
    border: 1px solid var(--border); color: var(--text); background: var(--panel2); }
  .links a:hover { border-color: var(--accent); color: var(--accent); }
  .links a.pdf { background: #2a1f12; }
  .links a.disabled { opacity: .3; pointer-events: none; }
  .ctags { display: flex; gap: 5px; flex-wrap: wrap; }
  .ctag { font-size: 11px; color: var(--muted); cursor: pointer; padding: 1px 6px;
    border-radius: 5px; background: var(--chip); }
  .ctag:hover { color: var(--accent); }
  .ctag.on { background: var(--chipOn); color: #fff; }
  .empty { color: var(--muted); padding: 40px; text-align: center; grid-column: 1/-1; }
  .modal-bg { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.78);
    display: none; flex-direction: column; }
  .modal-bg.open { display: flex; }
  .modal-bar { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
    background: var(--panel); border-bottom: 1px solid var(--border); }
  .modal-bar .t { flex: 1; font-size: 13px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-bar a, .modal-bar button { font-size: 12px; padding: 5px 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--panel2); color: var(--text);
    text-decoration: none; cursor: pointer; font-family: inherit; }
  .modal-bar a:hover, .modal-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .modal-bg iframe { flex: 1; width: 100%; border: 0; background: #525659; }
</style>
</head>
<body>
<header>
  <h1>dex-papers <span class="count" id="count"></span>
    <a href="overview.html" style="float:right;font-size:12.5px;font-weight:400;text-decoration:none;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);color:var(--accent)">📄 Landscape overview →</a>
  </h1>
  <input class="search" id="search" type="search" placeholder="Search title or tag…" autocomplete="off">
  <div class="barlabel zonetoggle" id="zoneToggle"><span class="caret">▶</span> <span id="zoneLabel">Filters &amp; collections</span> <span class="zonesummary" id="zoneSummary"></span></div>
  <div id="filterZone">
    <div class="barlabel">Collections</div>
    <div class="chips" id="collbar"></div>
    <div class="barlabel">Filters <span style="text-transform:none">(click a category to expand · AND across categories, OR within)</span></div>
    <div id="filters"></div>
  </div>
  <div class="meta-row"><span class="clear" id="clear">✕ clear filters</span></div>
</header>
<main id="grid"></main>

<div class="modal-bg" id="pdfModal">
  <div class="modal-bar">
    <span class="t" id="pdfTitle"></span>
    <a id="pdfNewTab" href="#" target="_blank" rel="noopener">↗ New tab</a>
    <button id="pdfClose">✕ Close (Esc)</button>
  </div>
  <iframe id="pdfFrame" title="PDF viewer"></iframe>
</div>

<script src="papers.js"></script>
<script>
  const P = window.PAPERS || [];
  const activeTags = new Set();
  const activeColls = new Set();
  let query = "";

  const grid = document.getElementById("grid");
  const filters = document.getElementById("filters");
  const collbar = document.getElementById("collbar");
  const countEl = document.getElementById("count");
  const zoneToggle = document.getElementById("zoneToggle");
  const filterZone = document.getElementById("filterZone");
  const zoneSummary = document.getElementById("zoneSummary");
  let zoneOpen = true;
  function applyZone() {
    filterZone.classList.toggle("collapsed", !zoneOpen);
    zoneToggle.classList.toggle("open", zoneOpen);
  }
  zoneToggle.onclick = () => { zoneOpen = !zoneOpen; applyZone(); };

  // build href for local PDF: encode each path segment (handles spaces, "?")
  const pdfHref = (f) => f.split("/").map(encodeURIComponent).join("/");

  // ---- tag taxonomy: group flat tags into categories for a drill-down filter UI ----
  const TAXONOMY = {
    "Lab / Org": ["Apple","Berkeley","Brown","CMU","DeepMind","Google","MIT","Meta","NVIDIA","NYU","OpenAI","PKU","Stanford","TUM","UCSD","USC","UT-Austin","ETH-Zurich"],
    "Method": ["RL","imitation-learning","sim-to-real","teleoperation","self-supervised","reset-free","reset","TAMP","VLA","LLM","diffusion","equivariant","flow-matching","one-shot","self-improving","pretraining","augmentation","multi-task","sample-efficient","agentic","generalist","human-in-the-loop","interactive","retargeting"],
    "Topic": ["manipulation","grasping","dexterous","bimanual","in-hand-reorientation","tool-use","long-horizon","contact-rich","data-collection","scaling","real-world","autonomous","crowdsourcing","deployment","bottle-cap","valve","door","placing","hand-object","handover","grasp-synthesis","humanoid","affordance","cross-embodiment","tactile"],
    "Perception": ["perception","segmentation","foundation","foundation-model","open-vocabulary","gaussian-splatting","video","video-prediction","video-planning","visuomotor","mocap","capture","human-video"],
    "Hardware": ["Allegro","Shadow","LEAP","Inspire","D'Claw","parallel-jaw"],
    "Type": ["survey","system","benchmark","analysis","dataset"]
  };
  const CAT_ORDER = ["Lab / Org","Year","Topic","Method","Perception","Hardware","Type"];
  const TAGCAT = {};
  Object.entries(TAXONOMY).forEach(([c,ts]) => ts.forEach(t => TAGCAT[t] = c));
  const catOf = (t) => t.indexOf("year:") === 0 ? "Year" : (TAGCAT[t] || "Other");

  // derive the primary 4-digit year from a venue string
  const yearOf = (p) => { const m = (p.venue||"").match(/(19|20)\d{2}/g); return m ? m[0] : null; };
  P.forEach(p => p._year = yearOf(p));

  // counts
  const tagCounts = {}, collCounts = {}, yearCounts = {};
  P.forEach(p => {
    (p.tags || []).forEach(t => tagCounts[t] = (tagCounts[t]||0)+1);
    collCounts[p.collection] = (collCounts[p.collection]||0)+1;
    if (p._year) { const k = "year:"+p._year; yearCounts[k] = (yearCounts[k]||0)+1; }
  });
  Object.assign(tagCounts, yearCounts);
  const allColls = Object.keys(collCounts).sort();

  // tags per category (year newest-first; others by count desc)
  const catTags = {};
  CAT_ORDER.forEach(c => {
    catTags[c] = c === "Year"
      ? Object.keys(yearCounts).sort((a,b) => b.localeCompare(a))
      : Object.keys(tagCounts).filter(t => catOf(t) === c)
          .sort((a,b) => tagCounts[b]-tagCounts[a] || a.localeCompare(b));
  });
  const placed = new Set([].concat(...CAT_ORDER.map(c => catTags[c])));
  const otherTags = Object.keys(tagCounts).filter(t => t.indexOf("year:") !== 0 && !placed.has(t))
    .sort((a,b) => tagCounts[b]-tagCounts[a] || a.localeCompare(b));
  if (otherTags.length) { catTags["Other"] = otherTags; CAT_ORDER.push("Other"); }

  const openCats = new Set();   // expanded category panels
  const chipLabel = (t) => t.indexOf("year:") === 0 ? t.slice(5) : t;

  function renderBars() {
    collbar.innerHTML = "";
    allColls.forEach(c => {
      const el = document.createElement("span");
      el.className = "chip coll" + (activeColls.has(c) ? " on" : "");
      el.innerHTML = c + ' <span class="n">' + collCounts[c] + '</span>';
      el.onclick = () => { activeColls.has(c) ? activeColls.delete(c) : activeColls.add(c); render(); };
      collbar.appendChild(el);
    });
    filters.innerHTML = "";
    const heads = document.createElement("div");
    heads.className = "catheads";
    filters.appendChild(heads);
    CAT_ORDER.forEach(cat => {
      const tags = catTags[cat]; if (!tags || !tags.length) return;
      const actN = tags.filter(t => activeTags.has(t)).length;
      const open = openCats.has(cat);
      const head = document.createElement("div");
      head.className = "cathead" + (open ? " open" : "");
      head.innerHTML = '<span class="caret">▶</span>' + cat +
        ' <span class="cn">(' + tags.length + ')</span>' +
        (actN ? ' <span class="actN">' + actN + '</span>' : '');
      head.onclick = () => { openCats.has(cat) ? openCats.delete(cat) : openCats.add(cat); render(); };
      heads.appendChild(head);
      if (open) {
        const panel = document.createElement("div");
        panel.className = "catpanel";
        const lbl = document.createElement("div");
        lbl.className = "lbl"; lbl.textContent = cat;
        panel.appendChild(lbl);
        const chips = document.createElement("div");
        chips.className = "chips";
        tags.forEach(t => {
          const el = document.createElement("span");
          el.className = "chip" + (activeTags.has(t) ? " on" : "");
          el.innerHTML = chipLabel(t) + ' <span class="n">' + tagCounts[t] + '</span>';
          el.onclick = () => toggleTag(t);
          chips.appendChild(el);
        });
        panel.appendChild(chips);
        filters.appendChild(panel);
      }
    });
  }

  function toggleTag(t) { activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); render(); }

  function match(p) {
    if (activeColls.size && !activeColls.has(p.collection)) return false;
    // AND across categories, OR within a category
    const groups = {};
    for (const t of activeTags) { const c = catOf(t); (groups[c] = groups[c] || []).push(t); }
    for (const c in groups) {
      let ok = false;
      for (const t of groups[c]) {
        if (c === "Year") { if (t === "year:"+(p._year||"")) { ok = true; break; } }
        else if ((p.tags||[]).includes(t)) { ok = true; break; }
      }
      if (!ok) return false;
    }
    if (query) {
      const hay = (p.title + " " + (p.tags||[]).join(" ") + " " + (p.venue||"")).toLowerCase();
      if (!hay.includes(query)) return false;
    }
    return true;
  }

  function linkEl(label, href, cls) {
    if (href) return '<a class="'+cls+'" href="'+href+'" target="_blank" rel="noopener">'+label+'</a>';
    return '<a class="'+cls+' disabled">'+label+'</a>';
  }

  function render() {
    renderBars();
    const nActive = activeTags.size + activeColls.size;
    zoneSummary.textContent = nActive ? "· " + nActive + " active" : "";
    const list = P.filter(match);
    countEl.textContent = "· " + list.length + " / " + P.length;
    grid.innerHTML = "";
    if (!list.length) { grid.innerHTML = '<div class="empty">No papers match.</div>'; return; }
    list.forEach(p => {
      const wrap = document.createElement("div");
      wrap.className = "rowwrap";
      const row = document.createElement("div");
      row.className = "prow";
      row.innerHTML =
        '<span class="caret">▶</span>' +
        '<span class="pt">'+p.title+'</span>' +
        (p.venue ? '<span class="pmeta">'+p.venue+'</span>' : '') +
        (p.cites != null ? '<span class="pcites">'+p.cites+' cit</span>' : '') +
        '<span class="pcoll">'+p.collection+'</span>';

      const detail = document.createElement("div");
      detail.className = "pdetail";
      detail.hidden = true;
      const tags = (p.tags||[]).map(t =>
        '<span class="ctag'+(activeTags.has(t)?' on':'')+'" data-tag="'+t+'">'+t+'</span>').join("");
      detail.innerHTML =
        (p.image ? '<div class="pimg"><img loading="lazy" src="'+p.image+'" alt="" ' +
                     'onerror="this.parentNode.remove()"></div>' : '') +
        '<div class="pbody">' +
          (p.desc ? '<div class="pdesc">'+p.desc+'</div>' : '') +
          '<div class="ctags">'+tags+'</div>' +
          '<div class="links">' +
            (p.summary ? '<a href="'+p.summary+'">📄 Summary</a>' : '') +
            (p.file ? '<a class="pdf" href="'+pdfHref(p.file)+'" data-pdf="1">PDF</a>'
                    : '<a class="pdf disabled">PDF</a>') +
            linkEl("arXiv", p.arxiv, "") +
            linkEl("Project", p.project, "") +
          '</div>' +
        '</div>';

      row.onclick = () => {
        const willOpen = detail.hidden;
        detail.hidden = !willOpen;
        row.classList.toggle("open", willOpen);
      };
      detail.querySelectorAll(".ctag").forEach(e =>
        e.onclick = () => toggleTag(e.dataset.tag));
      detail.querySelectorAll("a.pdf[data-pdf]").forEach(a =>
        a.onclick = (e) => {
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1) return; // let new-tab work
          e.preventDefault();
          openPdf(a.getAttribute("href"), p.title);
        });
      wrap.appendChild(row);
      wrap.appendChild(detail);
      grid.appendChild(wrap);
    });
  }

  document.getElementById("search").addEventListener("input", e => {
    query = e.target.value.trim().toLowerCase(); render();
  });
  document.getElementById("clear").onclick = () => {
    activeTags.clear(); activeColls.clear(); query = "";
    document.getElementById("search").value = ""; render();
  };

  // in-page PDF viewer (works from file:// — iframe is a same-origin subresource, not a fetch)
  const pdfModal = document.getElementById("pdfModal");
  const pdfFrame = document.getElementById("pdfFrame");
  const pdfTitle = document.getElementById("pdfTitle");
  const pdfNewTab = document.getElementById("pdfNewTab");
  function openPdf(href, title) {
    pdfFrame.src = href;
    pdfTitle.textContent = title;
    pdfNewTab.href = href;
    pdfModal.classList.add("open");
  }
  function closePdf() { pdfModal.classList.remove("open"); pdfFrame.src = "about:blank"; }
  document.getElementById("pdfClose").onclick = closePdf;
  pdfModal.addEventListener("click", e => { if (e.target === pdfModal) closePdf(); });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && pdfModal.classList.contains("open")) closePdf();
  });

  applyZone();
  render();
</script>
</body>
</html>
